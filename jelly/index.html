<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#eeeae4" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <title>Jelly</title>
    <script type="module" crossorigin src="./assets/index-eMKkjN1Y.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/xpbd-prototype-BrGZ49xc.js">
    <link rel="stylesheet" crossorigin href="./assets/index-CFY4bjNA.css">
  </head>
  <body>
    <main id="app" aria-label="Interactive 3D jelly scene">
      <div class="brand" aria-hidden="true">JELLY</div>
      <div class="controls">
        <fieldset id="stage-switch" class="stage-switch" aria-label="Jelly shape">
          <legend>Jelly shape</legend>
          <button class="stage-option" type="button" data-stage="box" aria-label="Box-shaped jelly" aria-pressed="true">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m5 7 7-3 7 3v10l-7 3-7-3V7Z" /><path d="m5 7 7 3 7-3M12 10v10" /></svg>
            <span>BOX</span>
          </button>
          <button class="stage-option" type="button" data-stage="tube" aria-label="Horizontal tube" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 8h12a4 4 0 0 1 0 8H5a3 3 0 0 1 0-8Z" /><path d="M5 8a4 4 0 0 1 0 8" /></svg>
            <span>TUBE</span>
          </button>
          <button class="stage-option" type="button" data-stage="procedural" aria-label="Molded jelly" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 18 7 8c.3-1.4 1.5-2.4 3-2.4h4c1.5 0 2.7 1 3 2.4l2 10H5Z" /><path d="M8 8c2 1.2 6 1.2 8 0M9 6.2 10 18M15 6.2 14 18" /></svg>
            <span>JELLY</span>
          </button>
          <button class="stage-option" type="button" data-stage="bunny" aria-label="Stanford Bunny" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8.5 11C6.7 7.5 6.8 3.2 8.3 3c1.4-.2 2.8 4.2 3.1 6.4M13 9.8c.5-3.8 2.1-7.3 3.4-6.8 1.5.5.9 5.2-.5 8" /><path d="M5 16.5c0-3.6 3-6.5 7-6.5s7 2.9 7 6.5V19H5v-2.5Z" /></svg>
            <span>BUNNY</span>
          </button>
        </fieldset>
        <div class="material-settings" aria-label="Material settings for the next jelly">
          <label class="stiffness-control">
            <span class="stiffness-endpoint" aria-hidden="true">
              <svg class="stiffness-icon" viewBox="0 0 24 24">
                <path d="M3.5 17c2-1.2 2.6-4.4 4.6-4.4 1.5 0 2.2 1.5 3.9 1.5s2.4-1.5 3.9-1.5c2 0 2.6 3.2 4.6 4.4-4.3 1.7-12.7 1.7-17 0Z" />
              </svg>
              <span class="stiffness-label">SOFT</span>
            </span>
            <input id="stiffness" type="range" min="0" max="100" value="62" aria-label="Stiffness of the next jelly" />
            <span class="stiffness-endpoint" aria-hidden="true">
              <svg class="stiffness-icon" viewBox="0 0 24 24">
                <path d="M7 18 8 7.2c.1-1.1 1-2 2.1-2h3.8c1.1 0 2 .9 2.1 2L17 18H7Z" />
              </svg>
              <span class="stiffness-label">FIRM</span>
            </span>
          </label>
        </div>
        <button id="add-jelly" class="control add" type="button" aria-label="Add jelly">
          <span class="color-orb"></span>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14" /></svg>
        </button>
        <button id="cut-mode" class="control" type="button" aria-label="Cut mode" aria-pressed="false">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 21h5l.9-9H16V3c-4.4 1.3-6.9 4.4-7 9l-3 9Z" /><path d="M9 12h2.9" /></svg>
        </button>
        <button id="fork-mode" class="control" type="button" aria-label="Fork mode. Drag to grab, then release to throw" aria-pressed="false">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3v5M11 3v5M15 3v5M19 3v5M7 6v2a6 6 0 0 0 6 6v7M19 6v2a6 6 0 0 1-6 6" /></svg>
        </button>
        <button id="reset" class="control" type="button" aria-label="Reset">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4.8 8.4A8 8 0 1 1 4 13M4.8 8.4V3.8M4.8 8.4h4.6" /></svg>
        </button>
      </div>
      <div id="cut-stroke" aria-hidden="true"></div>
      <button id="render-style" class="render-style" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5.2 17.5 7.3 7.3c.3-1.3 1.4-2.2 2.7-2.2h4c1.3 0 2.4.9 2.7 2.2l2.1 10.2c-3.9 1.7-9.7 1.7-13.6 0Z" />
          <path d="M7 13.2c2.8 1.2 7.2 1.2 10 0M8.2 8.5c2.2.8 5.4.8 7.6 0" />
        </svg>
        <span id="render-style-label">GEL</span>
      </button>
      <output id="performance-status" role="timer" aria-live="off" aria-label="Physics simulation load">Measuring</output>
      <output id="webgpu-benchmark" hidden aria-live="polite"></output>
      <div id="webgpu-error" role="alert" hidden>WebGPU is unavailable</div>
    </main>
  </body>
</html>
