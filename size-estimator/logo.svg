<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="100%" stop-color="#070a14" />
    </linearGradient>

    <!-- Main Gradient (Cyan to Purple) -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <!-- Secondary Gradient (Glow Accent) -->
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>

    <!-- Intense Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="256" height="256" rx="64" fill="url(#bgGrad)" />

  <!-- Abstract Minimalist "M" / Measurement Logo -->
  <g filter="url(#glow)">
    <!-- The "M" Path: Designed as a continuous geometric ribbon -->
    <path d="M 64 176 L 64 80 L 128 144 L 192 80 L 192 176" 
          fill="none" 
          stroke="url(#mainGrad)" 
          stroke-width="24" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- Ruler Ticks on the left leg: Simplifies the concept of measurement -->
    <line x1="64" y1="100" x2="80" y2="100" stroke="#0a0f1d" stroke-width="4" stroke-linecap="round" />
    <line x1="64" y1="128" x2="84" y2="128" stroke="#0a0f1d" stroke-width="4" stroke-linecap="round" />
    <line x1="64" y1="156" x2="80" y2="156" stroke="#0a0f1d" stroke-width="4" stroke-linecap="round" />

    <!-- Target Indicator / Dot on the right peak -->
    <circle cx="192" cy="80" r="6" fill="#ffffff" />
  </g>
</svg>
