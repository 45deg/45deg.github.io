<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/mvp.css">
    <title>Jinja2 Template Renderer (Pyodide)</title>
    <meta name="description" content="A browser renderer that runs Jinja2 templates on Pyodide.">
    <meta name="keywords" content="Jinja2, Pyodide, template renderer, browser tool">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://45deg.github.io/misc/jinja2.html">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://45deg.github.io/misc/jinja2.html">
    <meta property="og:title" content="Jinja2 Template Renderer">
    <meta property="og:description" content="A browser renderer that runs Jinja2 templates on Pyodide.">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Jinja2 Template Renderer">
    <meta name="twitter:description" content="A browser renderer that runs Jinja2 templates on Pyodide.">
    <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js" integrity="sha256-qXBd/EfAdjOA2FGrGAG+b3YBn2tn5A6bhz+LSgYD96k=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.21.3/full/pyodide.js" integrity="sha384-sa6uixo5T2AshTFl3QRZOXvvEFbSIqG9u/ZkaIJKa0JflYM9sd0ZkW8GWITluEQH" crossorigin="anonymous"></script>
    <style>
        textarea {
            font-family: monospace;
        }

        #error {
            white-space: pre;
            color: #a00000;
            background: #fff0f0;
            padding: 0.75rem;
            border-radius: 4px;
        }

        #spin {
            text-align: center;
            margin: 2rem 0;
        }

        #ui {
            display: none;
            gap: 1rem;
        }

        #ui.active {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        #sample-btn {
            font-size: 0.8rem;
            padding: 0.35rem 0.7rem;
        }

        @media (max-width: 800px) {
            #ui.active {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script>
        let pyodide;

        async function main() {
            pyodide = await loadPyodide();
            await pyodide.loadPackage("micropip"); // install pip
            const micropip = pyodide.pyimport("micropip");
            await micropip.install(['jinja2', 'pyyaml']); // instsall jinja2

            document.querySelector('#spin').hidden = true;
            document.querySelector('#ui').classList.add('active');

            document.querySelector('#template').oninput = _.debounce(compile, 200);
            document.querySelector('#data').oninput = _.debounce(compile, 200);
            document.querySelector('#sample-btn').disabled = false;
            document.querySelector('#sample-btn').addEventListener('click', async () => {
                document.querySelector('#template').value = `Hello {{ user.name }}!
{% if user.admin -%}
You are an admin user.
{%- endif %}

Items:
{% for item in items -%}
- {{ loop.index }}. {{ item }}
{% endfor %}`;
                document.querySelector('#data').value = `user:
  name: Alice
  admin: true
items:
  - Apple
  - Banana
  - Cherry`;
                await compile();
            });
        }

        async function compile() {
            window.template = document.querySelector('#template').value;
            window.data = document.querySelector('#data').value;
            window.error = null;

            let result = await pyodide.runPythonAsync(`
            import yaml
            from jinja2 import Environment, BaseLoader, exceptions
            import js
            def render(template, yaml_data):
                try:
                    data = yaml.safe_load(yaml_data)
                    if not data:
                        data = {}
                    if not isinstance(data,dict):
                        js.error = "YAMLError: Not object"
                        return ''
                    return Environment(loader=BaseLoader).from_string(template).render(**data)
                except yaml.parser.ParserError as exn:
                    js.error = "YAMLError:" + str(exn)
                except exceptions.TemplateSyntaxError as exn:
                    js.error = "TemplateError:" + str(exn)
                return ''

            render(js.template, js.data)
            `);

            const errorEl = document.querySelector('#error');
            if (error) {
                errorEl.hidden = false;
                errorEl.textContent = error;
            } else {
                errorEl.hidden = true;
                document.querySelector('#result').value = result;
            }
        }
    </script>
</head>

<body>
    <main>
        <h1>Jinja2 Template Renderer</h1>
        <p><button id="sample-btn" disabled>Example</button></p>

        <section id="spin">
            <p>Loading Pyodide...</p>
        </section>

        <section id="ui">
            <article>
                <h2>Template</h2>
                <textarea rows="10" id="template"></textarea>

                <h2>Data (YAML)</h2>
                <textarea rows="10" id="data">{}</textarea>
            </article>
            <article>
                <h2>Result</h2>
                <pre id="error" hidden></pre>
                <textarea rows="15" readonly id="result"></textarea>
            </article>
        </section>
    </main>
    <script>main()</script>
</body>

</html>
